name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx -w src/frontend eslint src --max-warnings 149

      - run: npm run type-check

      - run: npm test -- --run

      - run: npm run build

  backend:
    name: Backend API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobscraper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            src/backend/api/requirements.txt
            src/backend/api/requirements-dev.txt

      - run: pip install -r src/backend/api/requirements.txt -r src/backend/api/requirements-dev.txt

      - run: cd src/backend && mypy

      - run: cd src/backend && pytest
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobscraper

  scripts:
    name: Scraper Scripts
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobscraper
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            scripts/requirements-dev.txt

      - run: pip install -r scripts/requirements.txt -r scripts/requirements-dev.txt

      - run: cd scripts && pytest
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobscraper

name: Scraper E2E (live)

# Live data-integrity checks for the Playwright scrapers. Drives the real
# Google/Apple/Microsoft scrapers against their live sites and asserts the
# output is healthy (non-empty floor, well-formed ids/urls, valid model). A
# failure here means a scraper broke (DOM/API change or environment issue) and
# would start falsely closing jobs via the consecutive-misses lifecycle — so a
# red run is the early warning that prevents a metric-skewing mass closure.
#
# Kept OUT of the PR-blocking CI (.github/workflows/ci.yml) because live-site
# flakiness must never block merges. Runs on a schedule + on demand instead.

on:
  schedule:
    # Twice a week, ~11 PM Central. GitHub cron is UTC and ignores DST, so
    # "night Central" is the next day at 04:00 UTC (CDT=23:00, CST=22:00).
    # Monday night (week start): Tue 04:00 UTC.
    - cron: "0 4 * * 2"
    # Friday night: Sat 04:00 UTC.
    - cron: "0 4 * * 6"
  workflow_dispatch:

concurrency:
  group: scraper-e2e
  cancel-in-progress: false

jobs:
  e2e:
    name: Live scraper data integrity
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            scripts/requirements.txt
            scripts/requirements-dev.txt

      - run: pip install -r scripts/requirements.txt -r scripts/requirements-dev.txt

      # --with-deps installs the system libraries Chromium needs. Omitting it
      # is exactly what crashed the browser (0 jobs -> mass closure); see
      # docs/incidents/2026-03-29-mass-job-closure.md.
      - run: playwright install --with-deps chromium

      - run: cd scripts && pytest -m e2e

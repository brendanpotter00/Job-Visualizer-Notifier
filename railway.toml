[build]
builder = "DOCKERFILE"
dockerfilePath = "src/backend/Dockerfile"

[deploy]
# /health/worker returns 503 when the Procrastinate worker has been silent
# for > 35 minutes (one cron tick + 5min slack). With this configured,
# Railway will auto-restart the container when the worker silently hangs —
# the failure class the 2026-05-19 supervisor PR couldn't cover.
healthcheckPath = "/health/worker"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
